
<style>
  .lp-wrap { padding: 1.5rem 0; font-family: var(--font-sans); }
  .lp-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .lp-control-item { display: flex; flex-direction: column; gap: 6px; }
  .lp-label { font-size: 13px; color: var(--color-text-secondary); display: flex; justify-content: space-between; }
  .lp-label span { font-weight: 500; color: var(--color-text-primary); }
  .lp-canvases { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .lp-canvas-box { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); overflow: hidden; position: relative; min-height: 180px; display: flex; align-items: center; justify-content: center; }
  .lp-canvas-box canvas { max-width: 100%; display: block; }
  .lp-canvas-label { position: absolute; top: 8px; left: 10px; font-size: 11px; color: var(--color-text-secondary); background: var(--color-background-primary); padding: 2px 8px; border-radius: 999px; border: 0.5px solid var(--color-border-tertiary); }
  .lp-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--color-text-secondary); font-size: 13px; cursor: pointer; padding: 2rem; text-align: center; }
  .lp-placeholder i { font-size: 36px; color: var(--color-text-tertiary); }
  .lp-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .lp-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; }
  .lp-btn:hover { background: var(--color-background-secondary); }
  .lp-btn.primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
  .lp-btn.primary:hover { opacity: 0.85; }
  .lp-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .lp-stat { font-size: 12px; color: var(--color-text-secondary); padding: 4px 0; }
  #lp-file-input { display: none; }
  .lp-full { grid-column: 1 / -1; }
  .lp-checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); }
</style>

<div class="lp-wrap">
  <h2 class="sr-only">Low Poly 图片处理器</h2>
  <input type="file" id="lp-file-input" accept="image/*">

  <div class="lp-canvases">
    <div class="lp-canvas-box" id="src-box">
      <span class="lp-canvas-label">原图</span>
      <div class="lp-placeholder" onclick="document.getElementById('lp-file-input').click()">
        <i class="ti ti-photo-up" aria-hidden="true"></i>
        <span>点击上传图片</span>
        <span style="font-size:11px">支持 JPG / PNG / WebP</span>
      </div>
      <canvas id="src-canvas" style="display:none"></canvas>
    </div>
    <div class="lp-canvas-box" id="dst-box">
      <span class="lp-canvas-label">Low Poly</span>
      <canvas id="dst-canvas"></canvas>
    </div>
  </div>

  <div class="lp-controls">
    <div class="lp-control-item">
      <div class="lp-label">采样点数 <span id="pts-val">800</span></div>
      <input type="range" id="pts" min="100" max="3000" step="50" value="800">
    </div>
    <div class="lp-control-item">
      <div class="lp-label">边缘采样比例 <span id="edge-val">60%</span></div>
      <input type="range" id="edge" min="0" max="100" step="5" value="60">
    </div>
    <div class="lp-control-item">
      <div class="lp-label">Canny 低阈值 <span id="tlo-val">30</span></div>
      <input type="range" id="tlo" min="5" max="100" step="5" value="30">
    </div>
    <div class="lp-control-item">
      <div class="lp-label">Canny 高阈值 <span id="thi-val">80</span></div>
      <input type="range" id="thi" min="20" max="200" step="5" value="80">
    </div>
    <div class="lp-control-item lp-full">
      <div class="lp-label">颜色取样方式</div>
      <div style="display:flex; gap:16px; margin-top:4px">
        <label class="lp-checkbox-row"><input type="radio" name="colormode" value="centroid" checked> 重心像素色</label>
        <label class="lp-checkbox-row"><input type="radio" name="colormode" value="avg"> 区域平均色</label>
      </div>
    </div>
    <div class="lp-control-item lp-full">
      <div class="lp-label">描边宽度 <span id="stroke-val">0px</span></div>
      <input type="range" id="stroke" min="0" max="3" step="0.5" value="0">
    </div>
  </div>

  <div class="lp-actions">
    <button class="lp-btn" onclick="document.getElementById('lp-file-input').click()"><i class="ti ti-photo" aria-hidden="true"></i> 选择图片</button>
    <button class="lp-btn primary" id="run-btn" onclick="runLowPoly()" disabled><i class="ti ti-wand" aria-hidden="true"></i> 生成 Low Poly</button>
    <button class="lp-btn" id="dl-btn" onclick="download()" disabled><i class="ti ti-download" aria-hidden="true"></i> 下载</button>
  </div>
  <p class="lp-stat" id="stat-text"></p>
</div>

<script>
let imgData = null, srcW = 0, srcH = 0;

const bind = (id, outId, fmt) => {
  const el = document.getElementById(id);
  const out = document.getElementById(outId);
  el.addEventListener('input', () => { out.textContent = fmt ? fmt(+el.value) : el.value; });
};
bind('pts', 'pts-val');
bind('edge', 'edge-val', v => v + '%');
bind('tlo', 'tlo-val');
bind('thi', 'thi-val');
bind('stroke', 'stroke-val', v => v + 'px');

document.getElementById('lp-file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
      srcW = w; srcH = h;
      const sc = document.getElementById('src-canvas');
      sc.width = w; sc.height = h;
      const ctx = sc.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      imgData = ctx.getImageData(0, 0, w, h);
      sc.style.display = 'block';
      document.querySelector('#src-box .lp-placeholder').style.display = 'none';
      const dc = document.getElementById('dst-canvas');
      dc.width = w; dc.height = h;
      document.getElementById('run-btn').disabled = false;
      document.getElementById('stat-text').textContent = `图片尺寸：${img.width} × ${img.height} → 渲染尺寸：${w} × ${h}`;
      runLowPoly();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
});

function gaussianBlur(data, w, h) {
  const k = [1,4,7,4,1, 4,16,26,16,4, 7,26,41,26,7, 4,16,26,16,4, 1,4,7,4,1];
  const sum = 273;
  const out = new Float32Array(w * h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let v = 0, ws = 0;
      for (let ky = -2; ky <= 2; ky++) {
        for (let kx = -2; kx <= 2; kx++) {
          const nx = x + kx, ny = y + ky;
          if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
          const ki = (ky+2)*5 + (kx+2);
          v += data[(ny*w + nx)*4] * k[ki]; ws += k[ki];
        }
      }
      out[y*w + x] = v / ws;
    }
  }
  return out;
}

function cannyEdges(pixels, w, h, tLo, tHi) {
  const gray = new Float32Array(w*h);
  for (let i = 0; i < w*h; i++) gray[i] = 0.299*pixels[i*4] + 0.587*pixels[i*4+1] + 0.114*pixels[i*4+2];
  const blurred = gaussianBlur(pixels, w, h);
  const mag = new Float32Array(w*h);
  const dir = new Float32Array(w*h);
  const Gx = [-1,0,1,-2,0,2,-1,0,1], Gy = [-1,-2,-1,0,0,0,1,2,1];
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      let gx = 0, gy = 0;
      for (let ky = -1; ky <= 1; ky++) {
        for (let kx = -1; kx <= 1; kx++) {
          const v = blurred[(y+ky)*w + (x+kx)];
          const ki = (ky+1)*3 + (kx+1);
          gx += v * Gx[ki]; gy += v * Gy[ki];
        }
      }
      mag[y*w+x] = Math.sqrt(gx*gx + gy*gy);
      dir[y*w+x] = Math.atan2(gy, gx);
    }
  }
  const nms = new Float32Array(w*h);
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const a = dir[y*w+x], m = mag[y*w+x];
      const angle = ((a * 180 / Math.PI) + 180) % 180;
      let n1, n2;
      if (angle < 22.5 || angle >= 157.5) { n1 = mag[y*w+x-1]; n2 = mag[y*w+x+1]; }
      else if (angle < 67.5) { n1 = mag[(y-1)*w+x+1]; n2 = mag[(y+1)*w+x-1]; }
      else if (angle < 112.5) { n1 = mag[(y-1)*w+x]; n2 = mag[(y+1)*w+x]; }
      else { n1 = mag[(y-1)*w+x-1]; n2 = mag[(y+1)*w+x+1]; }
      nms[y*w+x] = (m >= n1 && m >= n2) ? m : 0;
    }
  }
  const edges = new Uint8Array(w*h);
  for (let i = 0; i < w*h; i++) {
    if (nms[i] >= tHi) edges[i] = 2;
    else if (nms[i] >= tLo) edges[i] = 1;
  }
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      if (edges[y*w+x] !== 1) continue;
      let hasStrong = false;
      for (let ky = -1; ky <= 1; ky++) for (let kx = -1; kx <= 1; kx++) if (edges[(y+ky)*w+(x+kx)] === 2) hasStrong = true;
      edges[y*w+x] = hasStrong ? 2 : 0;
    }
  }
  return edges;
}

function delaunay(points) {
  const n = points.length;
  const supers = [[1e6, -1e7], [-1e6, -1e7], [0, 1e7]];
  const allPts = [...points, ...supers];
  let triangles = [[n, n+1, n+2]];
  for (let pi = 0; pi < n; pi++) {
    const px = allPts[pi][0], py = allPts[pi][1];
    const bad = [];
    for (const t of triangles) {
      const ax = allPts[t[0]][0], ay = allPts[t[0]][1];
      const bx = allPts[t[1]][0], by = allPts[t[1]][1];
      const cx = allPts[t[2]][0], cy = allPts[t[2]][1];
      const D = 2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
      if (Math.abs(D) < 1e-10) continue;
      const ux = ((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/D;
      const uy = ((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/D;
      const r2 = (ax-ux)*(ax-ux)+(ay-uy)*(ay-uy);
      if ((px-ux)*(px-ux)+(py-uy)*(py-uy) <= r2+1e-6) bad.push(t);
    }
    const boundary = [];
    for (const t of bad) {
      const edges = [[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]];
      for (const e of edges) {
        const shared = bad.some(o => o !== t && ((o[0]===e[0]||o[1]===e[0]||o[2]===e[0]) && (o[0]===e[1]||o[1]===e[1]||o[2]===e[1])));
        if (!shared) boundary.push(e);
      }
    }
    for (const bt of bad) triangles.splice(triangles.indexOf(bt), 1);
    for (const e of boundary) triangles.push([e[0], e[1], pi]);
  }
  return triangles.filter(t => t[0] < n && t[1] < n && t[2] < n);
}

function avgColor(pixels, w, h, ax, ay, bx, by, cx, cy) {
  const minX = Math.max(0, Math.min(ax,bx,cx)|0);
  const maxX = Math.min(w-1, Math.ceil(Math.max(ax,bx,cx)));
  const minY = Math.max(0, Math.min(ay,by,cy)|0);
  const maxY = Math.min(h-1, Math.ceil(Math.max(ay,by,cy)));
  let r=0,g=0,b=0,cnt=0;
  for (let y = minY; y <= maxY; y++) {
    for (let x = minX; x <= maxX; x++) {
      const d0 = (bx-ax)*(y-ay)-(by-ay)*(x-ax);
      const d1 = (cx-bx)*(y-by)-(cy-by)*(x-bx);
      const d2 = (ax-cx)*(y-cy)-(ay-cy)*(x-cx);
      if ((d0>=0&&d1>=0&&d2>=0)||(d0<=0&&d1<=0&&d2<=0)) {
        const i=(y*w+x)*4; r+=pixels[i]; g+=pixels[i+1]; b+=pixels[i+2]; cnt++;
      }
    }
  }
  if (cnt === 0) { const i=(((ay+by+cy)/3|0)*w+((ax+bx+cx)/3|0))*4; return [pixels[i],pixels[i+1],pixels[i+2]]; }
  return [r/cnt|0, g/cnt|0, b/cnt|0];
}

function runLowPoly() {
  if (!imgData) return;
  const t0 = performance.now();
  const pts_n = +document.getElementById('pts').value;
  const edgePct = +document.getElementById('edge').value / 100;
  const tLo = +document.getElementById('tlo').value;
  const tHi = +document.getElementById('thi').value;
  const strokeW = +document.getElementById('stroke').value;
  const colorMode = document.querySelector('input[name="colormode"]:checked').value;
  const pxs = imgData.data;
  const w = srcW, h = srcH;
  const edges = cannyEdges(pxs, w, h, tLo, tHi);
  const edgePts = [], randPts = [];
  for (let y = 1; y < h-1; y++) for (let x = 1; x < w-1; x++) if (edges[y*w+x] === 2) edgePts.push([x,y]);
  const nEdge = Math.min(Math.round(pts_n * edgePct), edgePts.length);
  const nRand = pts_n - nEdge;
  for (let i = 0; i < nEdge; i++) {
    const idx = Math.random() * edgePts.length | 0;
    randPts.push(edgePts[idx]);
  }
  for (let i = 0; i < nRand; i++) randPts.push([Math.random()*w|0, Math.random()*h|0]);
  const corners = [[0,0],[w-1,0],[0,h-1],[w-1,h-1],[w/2|0,0],[w/2|0,h-1],[0,h/2|0],[w-1,h/2|0]];
  const allPts = [...randPts, ...corners];
  const tris = delaunay(allPts);
  const dc = document.getElementById('dst-canvas');
  dc.width = w; dc.height = h;
  const ctx = dc.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  for (const t of tris) {
    const ax = allPts[t[0]][0], ay = allPts[t[0]][1];
    const bx = allPts[t[1]][0], by = allPts[t[1]][1];
    const cx2 = allPts[t[2]][0], cy2 = allPts[t[2]][1];
    let col;
    if (colorMode === 'avg') {
      col = avgColor(pxs, w, h, ax, ay, bx, by, cx2, cy2);
    } else {
      const mx = ((ax+bx+cx2)/3)|0, my = ((ay+by+cy2)/3)|0;
      const ci = (Math.min(Math.max(my,0),h-1)*w + Math.min(Math.max(mx,0),w-1))*4;
      col = [pxs[ci], pxs[ci+1], pxs[ci+2]];
    }
    ctx.beginPath();
    ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.lineTo(cx2, cy2); ctx.closePath();
    ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
    ctx.fill();
    if (strokeW > 0) {
      ctx.strokeStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
      ctx.lineWidth = strokeW;
      ctx.stroke();
    }
  }
  const t1 = performance.now();
  document.getElementById('stat-text').textContent = `三角形数量：${tris.length}，采样点：${allPts.length}，耗时：${Math.round(t1-t0)}ms`;
  document.getElementById('dl-btn').disabled = false;
}

function download() {
  const dc = document.getElementById('dst-canvas');
  const a = document.createElement('a');
  a.download = 'low-poly.png';
  a.href = dc.toDataURL('image/png');
  a.click();
}
</script>
