<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>Low Poly Image</title>
  <style>
    body {
      margin: 0;
      background: #111827;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .panel {
      margin-bottom: 16px;
    }

    canvas {
      max-width: 100%;
      background: #000;
      border: 1px solid #334155;
    }

    input,
    button {
      margin-right: 12px;
    }
  </style>
</head>

<body>
  <h2>图片 Low-Poly 风格处理</h2>

  <div class="panel">
    <input type="file" id="file" accept="image/*" />
    <label>
      点数量：
      <input type="range" id="pointCount" min="300" max="3000" value="1200" />
      <span id="countText">1200</span>
    </label>
    <button id="download">下载图片</button>
  </div>

  <canvas id="canvas"></canvas>

  <!-- Delaunay 三角剖分库 -->
  <script src="https://cdn.jsdelivr.net/npm/delaunator@5.0.1/delaunator.min.js"></script>

  <script>
    const fileInput = document.getElementById('file')
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d', { willReadFrequently: true })
    const pointCountInput = document.getElementById('pointCount')
    const countText = document.getElementById('countText')
    const downloadBtn = document.getElementById('download')

    let image = null

    pointCountInput.addEventListener('input', () => {
      countText.textContent = pointCountInput.value
      if (image) renderLowPoly(image)
    })

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0]
      if (!file) return

      const img = new Image()
      const url = URL.createObjectURL(file)
      img.onload = () => {
        image = img
        renderLowPoly(img)
        URL.revokeObjectURL(url)
      }
      img.src = url
    })

    function renderLowPoly (img) {
      const maxWidth = 900
      const scale = Math.min(1, maxWidth / img.width)
      const width = Math.floor(img.width * scale)
      const height = Math.floor(img.height * scale)

      canvas.width = width
      canvas.height = height

      ctx.drawImage(img, 0, 0, width, height)

      const imageData = ctx.getImageData(0, 0, width, height)
      const data = imageData.data

      const pointCount = Number(pointCountInput.value)
      const points = []

      // 1. 添加边界点，避免边缘缺失
      addBoundaryPoints(points, width, height, 30)

      // 2. 添加随机采样点
      for (let i = 0; i < pointCount; i++) {
        points.push([
          Math.random() * width,
          Math.random() * height
        ])
      }

      // 3. 添加边缘采样点，让轮廓更明显
      addEdgePoints(points, data, width, height, pointCount * 0.4)

      // 4. Delaunay 三角剖分
      const delaunay = Delaunator.from(points)
      const triangles = delaunay.triangles

      ctx.clearRect(0, 0, width, height)

      for (let i = 0; i < triangles.length; i += 3) {
        const p1 = points[triangles[i]]
        const p2 = points[triangles[i + 1]]
        const p3 = points[triangles[i + 2]]

        const cx = Math.floor((p1[0] + p2[0] + p3[0]) / 3)
        const cy = Math.floor((p1[1] + p2[1] + p3[1]) / 3)

        const color = getPixelColor(data, width, cx, cy)

        ctx.beginPath()
        ctx.moveTo(p1[0], p1[1])
        ctx.lineTo(p2[0], p2[1])
        ctx.lineTo(p3[0], p3[1])
        ctx.closePath()

        ctx.fillStyle = color
        ctx.fill()

        // 轻微描边，让多边形块面更明显
        ctx.strokeStyle = color
        ctx.stroke()
      }
    }

    function addBoundaryPoints (points, width, height, step) {
      for (let x = 0; x <= width; x += step) {
        points.push([x, 0])
        points.push([x, height])
      }

      for (let y = 0; y <= height; y += step) {
        points.push([0, y])
        points.push([width, y])
      }

      points.push([0, 0])
      points.push([width, 0])
      points.push([0, height])
      points.push([width, height])
    }

    function addEdgePoints (points, data, width, height, maxPoints) {
      let added = 0
      const step = 4

      for (let y = step; y < height - step; y += step) {
        for (let x = step; x < width - step; x += step) {
          const brightness = getBrightness(data, width, x, y)
          const right = getBrightness(data, width, x + step, y)
          const bottom = getBrightness(data, width, x, y + step)

          const diff = Math.abs(brightness - right) + Math.abs(brightness - bottom)

          if (diff > 80 && Math.random() > 0.5) {
            points.push([x, y])
            added++
          }

          if (added >= maxPoints) return
        }
      }
    }

    function getBrightness (data, width, x, y) {
      const index = (y * width + x) * 4
      const r = data[index]
      const g = data[index + 1]
      const b = data[index + 2]

      return 0.299 * r + 0.587 * g + 0.114 * b
    }

    function getPixelColor (data, width, x, y) {
      const index = (y * width + x) * 4
      const r = data[index]
      const g = data[index + 1]
      const b = data[index + 2]
      const a = data[index + 3] / 255

      return `rgba(${r}, ${g}, ${b}, ${a})`
    }

    downloadBtn.addEventListener('click', () => {
      const a = document.createElement('a')
      a.download = 'low-poly.png'
      a.href = canvas.toDataURL('image/png')
      a.click()
    });
  </script>
</body>

</html>
