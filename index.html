<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>OpenCV Low Poly</title>

    <style>
      body {
        margin: 0;
        background: #111;
        color: white;
        font-family: sans-serif;
        overflow: hidden;
      }

      .toolbar {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;

        background: rgba(0, 0, 0, 0.6);
        padding: 14px;
        border-radius: 12px;
        backdrop-filter: blur(10px);
      }

      .toolbar label {
        display: block;
        margin-top: 10px;
      }

      .container {
        display: flex;
        width: 100vw;
        height: 100vh;
      }

      canvas {
        width: 33.33vw;
        height: 100vh;
        object-fit: contain;
        background: #222;
      }

      input[type="range"] {
        width: 220px;
      }
    </style>
  </head>

  <body>
    <div class="toolbar">
      <input type="file" id="fileInput" accept="image/*" />

      <label>
        threshold1:
        <span id="t1Value">80</span>
      </label>

      <input id="threshold1" type="range" min="0" max="300" value="80" />

      <label>
        threshold2:
        <span id="t2Value">160</span>
      </label>

      <input id="threshold2" type="range" min="0" max="300" value="160" />
    </div>

    <div class="container">
      <canvas id="srcCanvas"></canvas>

      <canvas id="edgeCanvas"></canvas>

      <canvas id="polyCanvas"></canvas>
    </div>

    <script src="./opencv.js?v=4.x"></script>

    <script type="module">
      // import Delaunator from "https://cdn.skypack.dev/delaunator";
      import Delaunator from "https://cdn.skypack.dev/delaunator@5.0.0";
      let srcMat = null;

      const fileInput = document.getElementById("fileInput");

      const threshold1Input = document.getElementById("threshold1");

      const threshold2Input = document.getElementById("threshold2");

      const t1Value = document.getElementById("t1Value");

      const t2Value = document.getElementById("t2Value");

      const srcCanvas = document.getElementById("srcCanvas");

      const edgeCanvas = document.getElementById("edgeCanvas");

      const polyCanvas = document.getElementById("polyCanvas");

      function randomPoints(width, height, count) {
        const points = [];

        for (let i = 0; i < count; i++) {
          points.push([Math.random() * width, Math.random() * height]);
        }

        return points;
      }

      function extractEdgePoints(edgeMat) {
        const points = [];

        const step = 9; // 控制能取到多少边缘点
        console.log(edgeMat.rows, edgeMat.cols);
        // edgeMat.rows -- h
        // edgeMat.cols -- w
        for (let y = 0; y < edgeMat.rows; y += step) {
          for (let x = 0; x < edgeMat.cols; x += step) {
            const value = edgeMat.ucharPtr(y, x)[0];
            if (value > 200) {
              points.push([x, y]);
            }
            // points.push([x, y]);
          }
        }

        return points;
      }

      function drawLowPoly(img, points) {
        const ctx = polyCanvas.getContext("2d");

        polyCanvas.width = img.width;
        polyCanvas.height = img.height;

        const delaunay = Delaunator.from(points);

        const triangles = delaunay.triangles;

        ctx.clearRect(0, 0, polyCanvas.width, polyCanvas.height);

        const temp = document.createElement("canvas");
        temp.width = img.width;
        temp.height = img.height;
        const tempCtx = temp.getContext("2d", {
          willReadFrequently: true,
        });
        tempCtx.drawImage(img, 0, 0);

        for (let i = 0; i < triangles.length; i += 3) {
          const p1 = points[triangles[i]];
          const p2 = points[triangles[i + 1]];
          const p3 = points[triangles[i + 2]];

          const cx = (p1[0] + p2[0] + p3[0]) / 3;

          const cy = (p1[1] + p2[1] + p3[1]) / 3;

          const pointData = tempCtx.getImageData(cx, cy, 1, 1).data;
          const color = `rgb(${pointData[0]},${pointData[1]},${pointData[2]})`;

          ctx.beginPath();

          ctx.moveTo(p1[0], p1[1]);
          ctx.lineTo(p2[0], p2[1]);
          ctx.lineTo(p3[0], p3[1]);

          ctx.closePath();

          ctx.fillStyle = color;

          ctx.fill();

          ctx.strokeStyle = color;

          ctx.stroke();
        }
      }

      function getPixelColor(img, x, y) {
        const temp = document.createElement("canvas");

        temp.width = img.width;
        temp.height = img.height;

        const ctx = temp.getContext("2d");

        ctx.drawImage(img, 0, 0);

        const data = ctx.getImageData(x, y, 1, 1).data;

        return `rgb(${data[0]},${data[1]},${data[2]})`;
      }

      function processImage(img) {
        srcCanvas.width = img.width;
        srcCanvas.height = img.height;

        edgeCanvas.width = img.width;
        edgeCanvas.height = img.height;

        polyCanvas.width = img.width;
        polyCanvas.height = img.height;

        const srcCtx = srcCanvas.getContext("2d");

        srcCtx.drawImage(img, 0, 0);

        if (srcMat) {
          srcMat.delete();
        }

        srcMat = cv.imread(srcCanvas);

        const gray = new cv.Mat();
        const blur = new cv.Mat();
        const edges = new cv.Mat();

        cv.cvtColor(srcMat, gray, cv.COLOR_RGBA2GRAY);
        // cv.imshow(edgeCanvas, gray);、
        // 高斯卷积核大小（Kernel Size） 必须是奇数
        // 核越大：

        // 模糊越强
        // 图像越平滑
        // 细节丢失越多
        cv.GaussianBlur(gray, blur, new cv.Size(3, 3), 0);

        // cv.imshow(edgeCanvas, blur);

        cv.Canny(
          blur,
          edges,
          Number(threshold1Input.value),
          Number(threshold2Input.value),
        );

        cv.imshow(edgeCanvas, edges);

        const edgePoints = extractEdgePoints(edges); // 提取高亮的点 边线

        const randPoints = randomPoints(img.width, img.height, 1500); // 1200

        const points = [
          // ...edgePoints,
          ...randPoints,
          ...edgePoints,
          [0, 0],
          [img.width, 0],
          [0, img.height],
          [img.width, img.height],
        ];

        drawLowPoly(img, points);

        gray.delete();
        blur.delete();
        edges.delete();
      }

      function loadImage(url) {
        const img = new Image();

        img.crossOrigin = "anonymous";

        img.onload = () => {
          processImage(img);
        };

        img.src = url;
        console.error(url);
      }

      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];

        if (!file) return;

        const url = URL.createObjectURL(file);
        console.error(url);

        loadImage(url);

        setTimeout(() => {
          URL.revokeObjectURL(url);
        }, 1000);
      });

      threshold1Input.addEventListener("input", () => {
        t1Value.innerText = threshold1Input.value;

        if (!srcMat) return;

        const img = new Image();

        img.src = srcCanvas.toDataURL();

        img.onload = () => {
          processImage(img);
        };
      });

      threshold2Input.addEventListener("input", () => {
        t2Value.innerText = threshold2Input.value;

        if (!srcMat) return;

        const img = new Image();

        img.src = srcCanvas.toDataURL();

        img.onload = () => {
          processImage(img);
        };
      });

      window.onload = () => {
        loadImage("https://picsum.photos/1200/800");
      };
    </script>
  </body>
</html>
